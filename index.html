<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>錢錢地圖 - 我的投資紀錄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8F9FB; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // 簡易圖示元件 (取代原本會報錯的 Lucide)
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;

        function App() {
            const [investments, setInvestments] = useState([
                { id: '1', platform: 'Google', amount: 2500, currency: 'USD', type: '美股 ETF', date: '2024-02-15', colorId: 'yellow', note: '長期持有' },
                { id: '2', platform: 'Apple', amount: 4800, currency: 'USD', type: '成長股', date: '2024-02-10', colorId: 'orange', note: '核心配置' }
            ]);

            return (
                <div className="max-w-md mx-auto min-h-screen pb-20 animate-in">
                    <header className="p-6 bg-white border-b sticky top-0 z-10">
                        <h1 className="text-2xl font-bold text-gray-800">💰 錢錢地圖</h1>
                        <p className="text-sm text-gray-500 mt-1">追蹤你的資產分佈</p>
                    </header>
                    
                    <main className="p-4 space-y-4">
                        {investments.map(inv => (
                            <div key={inv.id} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                                <div className="flex justify-between items-start">
                                    <div>
                                        <h3 className="font-bold text-lg text-gray-800">{inv.platform}</h3>
                                        <p className="text-xs text-gray-400">{inv.date}</p>
                                    </div>
                                    <div className="text-right">
                                        <p className="font-bold text-blue-600">{inv.currency} {inv.amount.toLocaleString()}</p>
                                        <span className="text-xs bg-gray-100 px-2 py-1 rounded-full text-gray-600">{inv.type}</span>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </main>

                    <button className="fixed bottom-6 right-6 bg-blue-600 text-white p-4 rounded-full shadow-lg active:scale-95 transition-transform">
                        <IconPlus />
                    </button>
                </div>
            );
        }

        // 這是最重要的一行：把 App 渲染到網頁上
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
